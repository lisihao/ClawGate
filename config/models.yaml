# 模型配置（本地 + 云端）

# 云端模型配置
cloud_models:
  # DeepSeek 系列
  - name: "deepseek-r1"
    provider: "deepseek"
    backend: "cloud"
    cost_per_1k: 0.0014
    quality_score: 0.95
    max_context: 64000
    use_cases: ["reasoning", "coding", "complex_analysis"]
    description: "深度推理，编码强"

  - name: "deepseek-v3"
    provider: "deepseek"
    backend: "cloud"
    cost_per_1k: 0.0014
    quality_score: 0.90
    max_context: 64000
    use_cases: ["chat", "coding", "translation"]
    description: "日常对话，便宜"

  # GLM 系列
  - name: "glm-5"
    provider: "glm"
    backend: "cloud"
    cost_per_1k: 0.001
    quality_score: 0.85
    max_context: 128000
    use_cases: ["chat", "coding", "translation"]
    description: "默认模型，中文好"

  - name: "glm-4-flash"
    provider: "glm"
    backend: "cloud"
    cost_per_1k: 0.0001
    quality_score: 0.70
    max_context: 128000
    use_cases: ["simple_tasks", "fast_response", "compression"]
    description: "快速响应，成本极低"

  # ChatGPT 订阅账户（后端 API）
  - name: "gpt-5.2"
    provider: "chatgpt"
    backend: "cloud"
    cost_per_1k: 0  # 订阅包含，无额外成本
    quality_score: 0.98  # 最新模型，质量最高
    max_context: 200000  # GPT-5 上下文更长
    use_cases: ["reasoning", "coding", "chat", "complex_analysis"]
    description: "ChatGPT Plus/Pro 订阅账户（最新）"

  - name: "gpt-5.1"
    provider: "chatgpt"
    backend: "cloud"
    cost_per_1k: 0  # 订阅包含
    quality_score: 0.95
    max_context: 200000
    use_cases: ["reasoning", "coding", "chat"]
    description: "ChatGPT Plus/Pro 订阅账户"

  - name: "gpt-5.1-codex-max"
    provider: "chatgpt"
    backend: "cloud"
    cost_per_1k: 0  # 订阅包含
    quality_score: 0.96
    max_context: 200000
    use_cases: ["coding", "complex_coding"]
    description: "代码专用（大模型）"

  - name: "gpt-5.1-codex-mini"
    provider: "chatgpt"
    backend: "cloud"
    cost_per_1k: 0  # 订阅包含
    quality_score: 0.90
    max_context: 128000
    use_cases: ["coding", "simple_coding"]
    description: "代码专用（快速）"

# Agent 配置
agent_profiles:
  judge:  # 审判官（DeepSeek-R1）
    preferred_models: ["deepseek-r1", "gpt-5.2"]
    fallback_models: ["deepseek-v3", "gpt-5.1", "glm-5"]
    chunk_size: 512
    priority: 1
    description: "深度分析、推理密集"

  builder:  # 建设者（GLM-5）
    preferred_models: ["glm-5", "qwen2.5-7b-mlx", "qwen2.5-7b-q8"]
    fallback_models: ["glm-4-flash", "qwen2.5-7b-q4"]
    chunk_size: 256
    priority: 2
    description: "日常编码、中等任务"

  flash:  # 闪电侠（GLM-4-Flash）
    preferred_models: ["glm-4-flash", "qwen2.5-7b-q4"]
    fallback_models: ["qwen2.5-7b-mlx"]
    chunk_size: 64
    priority: 0
    description: "快速查询、简单任务"

# 路由规则
routing_rules:
  # 任务类型 → 模型映射
  task_routing:
    reasoning:
      complexity_threshold: 0.7
      models: ["deepseek-r1", "gpt-5.2", "gpt-5.1"]

    coding:
      complexity_threshold: 0.5
      models: ["glm-5", "qwen2.5-7b-mlx", "deepseek-v3"]

    translation:
      complexity_threshold: 0.3
      models: ["glm-5", "glm-4-flash", "qwen2.5-7b-q8"]

    chat:
      complexity_threshold: 0.4
      models: ["glm-5", "qwen2.5-7b-mlx", "glm-4-flash"]

  # 成本优化策略
  cost_optimization:
    enabled: true
    max_cost_per_request: 0.01  # 单次请求最大成本
    prefer_local: true           # 优先使用本地模型

  # 质量保证
  quality_assurance:
    min_quality_score: 0.7
    auto_retry_on_low_quality: true
    retry_with_stronger_model: true

# 队列调度配置
scheduling:
  max_total_queue: 200
  agent_fair_share: 0.6
  workers:
    fast: 2
    normal: 3
    background: 2
  concurrency:
    local_default: 1
    cloud_default: 5
    per_backend:
      deepseek: 5
      glm: 5
      openai: 3
      chatgpt: 2
      gemini: 5
